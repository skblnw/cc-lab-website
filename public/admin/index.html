<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CC Lab - Content Management</title>
    <!-- Include the styles for the Decap CMS UI, released under the MIT License -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/decap-cms@^3.0.0/dist/decap-cms.css" />
    <meta name="robots" content="noindex" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://cdn.jsdelivr.net/npm/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <!-- BibTeX parsing library for the import widget -->
    <script src="https://cdn.jsdelivr.net/npm/bibtex-parse-js@0.0.24/bibtexParse.js"></script>
    <!-- Custom BibTeX import widget - loaded after CMS is ready -->
    <script>
      // Wait for CMS to be fully initialized before loading custom widget
      if (window.CMS) {
        var script = document.createElement('script');
        script.src = '/admin/bibtex-widget.js';
        document.body.appendChild(script);
      } else {
        window.addEventListener('DOMContentLoaded', function() {
          var checkCMS = setInterval(function() {
            if (window.CMS) {
              clearInterval(checkCMS);
              var script = document.createElement('script');
              script.src = '/admin/bibtex-widget.js';
              document.body.appendChild(script);
            }
          }, 50);
        });
      }
    </script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.open();
          }
        });
      }
    </script>
  </body>
</html>
